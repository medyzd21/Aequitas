[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "paris"
verbosity = 2
fs_permissions = [{ access = "read-write", path = "./deployments" }]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

[rpc_endpoints]
localhost = "http://127.0.0.1:8545"
sepolia   = "${SEPOLIA_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
